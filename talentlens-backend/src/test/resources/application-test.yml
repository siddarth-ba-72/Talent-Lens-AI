de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.3

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-characters-ok
    access-expiry-ms: 900000
    refresh-expiry-ms: 604800000
  ai-service:
    url: http://localhost:8000
    timeout-seconds: 5
  cors:
    allowed-origins: http://localhost:3000
  kafka:
    topics:
      sourcing-requests: sourcing-requests
      sourcing-results: sourcing-results
  rate-limit:
    max-attempts: 100
    window-seconds: 60

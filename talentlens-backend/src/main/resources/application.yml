spring:
  application:
    name: talentlens-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 7236

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout-seconds: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  kafka:
    topics:
      sourcing-requests: sourcing-requests
      sourcing-results: sourcing-results
  rate-limit:
    max-attempts: 5
    window-seconds: 60


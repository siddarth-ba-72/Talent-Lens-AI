spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://root:root@localhost:27017/talentlens?authSource=admin}
      database: ${MONGODB_DATABASE:talentlens}
      auto-index-creation: false

app:
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:9000}
    timeout-seconds: 30
    sourcing-timeout-seconds: 120
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
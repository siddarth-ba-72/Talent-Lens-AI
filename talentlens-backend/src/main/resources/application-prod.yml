spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}
      auto-index-creation: false

app:
  ai-service:
    url: ${AI_SERVICE_URL}
    timeout-seconds: 30
    sourcing-timeout-seconds: 120
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
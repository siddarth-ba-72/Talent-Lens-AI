spring:
  application:
    name: talentlens-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 7236

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
    access-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000}
  rate-limit:
    max-attempts: 5
    window-seconds: 60

